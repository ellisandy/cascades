<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cascades Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #toolbar label { color: #8b949e; white-space: nowrap; }
    #layout-select {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
    }
    .btn {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      white-space: nowrap;
    }
    .btn:hover { background: #30363d; }
    .btn-primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .btn-primary:hover { background: #388bfd; }
    .btn-danger { background: #da3633; border-color: #da3633; color: #fff; }
    .btn-danger:hover { background: #f85149; }
    .active-badge {
      background: #238636; color: #fff; font-size: 10px; font-weight: bold;
      padding: 2px 6px; border-radius: 3px; letter-spacing: 0.5px;
    }
    .toolbar-sep { flex: 1; min-width: 4px; }
    #status-msg { font-size: 12px; min-width: 80px; }
    .grid-label {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #8b949e;
      cursor: pointer;
      white-space: nowrap;
    }
    .grid-label input { cursor: pointer; }
    .snap-label {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #8b949e;
      cursor: pointer;
      white-space: nowrap;
    }
    .snap-label input { cursor: pointer; }
    .layout-name-editor {
      display: inline-block;
      padding: 4px 6px;
      color: #58a6ff;
      cursor: pointer;
      border-radius: 3px;
      border: 1px solid transparent;
    }
    .layout-name-editor:hover {
      border-color: #58a6ff;
    }
    .layout-name-editor.editing {
      border-color: #58a6ff;
      padding: 2px 4px;
    }
    .layout-name-editor input {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      width: 150px;
    }
    .layout-name-editor input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    /* ── Toast Notifications ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      z-index: 5000;
    }
    .toast {
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-left: 3px solid #1f6feb;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: auto;
      animation: slideIn 0.3s ease-out;
    }
    .toast.success { border-left-color: #3fb950; }
    .toast.error { border-left-color: #f85149; }
    @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Palette ── */
    #palette {
      width: 190px;
      min-width: 190px;
      background: #0d1117;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      padding: 8px;
      flex-shrink: 0;
    }
    .palette-section-header {
      color: #8b949e;
      font-size: 10px;
      letter-spacing: 1.5px;
      padding: 6px 4px 4px;
      border-bottom: 1px solid #21262d;
      margin-bottom: 6px;
    }
    .palette-item {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 6px;
      cursor: grab;
      user-select: none;
    }
    .palette-item:hover { border-color: #58a6ff; }
    .palette-item:active { cursor: grabbing; }
    .palette-item-name {
      font-weight: bold;
      color: #58a6ff;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .palette-variants {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .variant-btn {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      padding: 1px 5px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
    }
    .variant-btn:hover { color: #c9d1d9; border-color: #58a6ff; }

    /* ── Right area ── */
    #right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* ── Canvas area ── */
    #canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    #canvas-outer {
      position: relative;
      flex-shrink: 0;
    }
    #canvas {
      width: 800px;
      height: 480px;
      background: #ffffff;
      position: relative;
      overflow: hidden;
      border: 1px solid #30363d;
      cursor: default;
      transform-origin: top left;
    }
    #canvas.drag-over { border-color: #58a6ff; }
    #canvas.grid-on {
      background-image:
        linear-gradient(rgba(200,200,200,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,200,200,0.5) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── Canvas items ── */
    .canvas-item {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: move;
      user-select: none;
      overflow: hidden;
      color: #000;
    }
    .canvas-item:hover { outline: 1px dashed rgba(88,166,255,0.6); }
    .canvas-item.selected { outline: 2px solid #58a6ff !important; }
    .canvas-item.collision { outline: 2px solid #f85149 !important; background-color: rgba(248, 81, 73, 0.1) !important; }
    .item-label {
      font-size: 11px;
      text-align: center;
      padding: 2px 4px;
      pointer-events: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
      color: rgba(201,209,217,0.9);
    }

    /* Resize handles */
    .resize-handle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #58a6ff;
      border: 1px solid #0d1117;
      border-radius: 1px;
    }
    .resize-nw { top: -4px; left: -4px; cursor: nw-resize; }
    .resize-n  { top: -4px; left: calc(50% - 4px); cursor: n-resize; }
    .resize-ne { top: -4px; right: -4px; cursor: ne-resize; }
    .resize-e  { top: calc(50% - 4px); right: -4px; cursor: e-resize; }
    .resize-se { bottom: -4px; right: -4px; cursor: se-resize; }
    .resize-s  { bottom: -4px; left: calc(50% - 4px); cursor: s-resize; }
    .resize-sw { bottom: -4px; left: -4px; cursor: sw-resize; }
    .resize-w  { top: calc(50% - 4px); left: -4px; cursor: w-resize; }

    /* ── Properties panel ── */
    #properties {
      height: 210px;
      min-height: 210px;
      background: #0d1117;
      border-top: 1px solid #30363d;
      padding: 10px 14px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .prop-header {
      font-weight: bold;
      color: #58a6ff;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .prop-grid {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 4px 8px;
      align-items: center;
    }
    .prop-grid label { color: #8b949e; font-size: 12px; }
    .prop-grid input,
    .prop-grid select {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 3px 6px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      width: 100%;
    }
    .prop-grid input:focus,
    .prop-grid select:focus { outline: none; border-color: #58a6ff; }
    .no-sel { color: #8b949e; font-size: 12px; padding: 4px 0; }

    /* ── Preview overlay ── */
    #preview-area {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #preview-area.hidden { display: none; }
    #preview-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #preview-img {
      display: block;
      max-width: 100%;
      max-height: calc(90vh - 60px);
    }
    #preview-close { display: flex; justify-content: center; }

    /* ── Text modal ── */
    #text-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
    }
    #text-modal.hidden { display: none; }
    #text-modal-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 20px;
      width: 320px;
    }
    #text-modal-box h3 { margin-bottom: 12px; color: #58a6ff; font-size: 14px; }
    #text-modal-box label {
      display: block;
      color: #8b949e;
      font-size: 12px;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    #text-modal-box input {
      width: 100%;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 6px 8px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 13px;
    }
    #text-modal-box input:focus { outline: none; border-color: #58a6ff; }
    .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
    #datafield-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
    }
    #datafield-modal.hidden { display: none; }
    #datafield-modal select {
      width: 100%;
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 6px 8px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 13px;
    }
    #datafield-modal select:focus { outline: none; border-color: #58a6ff; }

    /* ── JSON Explorer modal ── */
    #json-explorer-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1002;
    }
    #json-explorer-modal.hidden { display: none; }
    #json-explorer-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 20px;
      width: 520px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    #json-explorer-box h3 {
      margin-bottom: 12px;
      color: #58a6ff;
      font-size: 14px;
      flex-shrink: 0;
    }
    #json-tree-container {
      flex: 1;
      overflow-y: auto;
      min-height: 120px;
      max-height: 60vh;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 8px;
      font-size: 12px;
    }
    .jtree-node { padding-left: 16px; }
    .jtree-root { padding-left: 0; }
    .jtree-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 0;
      line-height: 1.6;
    }
    .jtree-toggle {
      cursor: pointer;
      color: #8b949e;
      user-select: none;
      width: 12px;
      text-align: center;
      flex-shrink: 0;
      font-size: 10px;
    }
    .jtree-toggle:hover { color: #c9d1d9; }
    .jtree-key { color: #79c0ff; }
    .jtree-colon { color: #8b949e; }
    .jtree-val-string { color: #a5d6ff; }
    .jtree-val-number { color: #d2a8ff; }
    .jtree-val-bool { color: #ff7b72; }
    .jtree-val-null { color: #8b949e; font-style: italic; }
    .jtree-type-hint { color: #484f58; font-size: 11px; }
    .jtree-add-btn {
      background: none;
      border: 1px solid #30363d;
      color: #3fb950;
      font-size: 10px;
      padding: 0 5px;
      border-radius: 3px;
      cursor: pointer;
      margin-left: 6px;
      font-family: inherit;
      white-space: nowrap;
      line-height: 1.6;
    }
    .jtree-add-btn:hover { background: #238636; color: #fff; border-color: #238636; }
    .jtree-children { display: block; }
    .jtree-children.collapsed { display: none; }
    #json-explorer-empty {
      color: #8b949e;
      text-align: center;
      padding: 20px;
    }
    /* ── Inline explorer in DataField modal ── */
    #df-explorer-inline {
      max-height: 200px;
      overflow-y: auto;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 6px;
      margin-top: 6px;
      font-size: 11px;
    }
    #df-explorer-inline.hidden { display: none; }
    #df-explorer-inline .jtree-node { padding-left: 14px; }
  </style>
</head>
<body>

<!-- ── Toolbar ── -->
<div id="toolbar">
  <label>Layout:</label>
  <select id="layout-select" onchange="onLayoutChange(this.value)"></select>
  <div id="layout-name-editor" class="layout-name-editor" onclick="startEditLayoutName()"></div>
  <span id="active-badge" class="active-badge" style="display:none">ACTIVE</span>
  <button class="btn" onclick="newLayout()" title="Create new layout">New</button>
  <button class="btn" onclick="duplicateLayout()" title="Duplicate current layout">Dup</button>
  <button class="btn btn-danger" onclick="deleteLayout()" title="Delete layout">Del</button>
  <button class="btn btn-primary" onclick="onPreview()">Preview</button>
  <button class="btn btn-primary" onclick="onSave()">Save</button>
  <button class="btn btn-primary" id="deploy-btn" onclick="deployLayout()" title="Set as active layout for /image.png">Deploy</button>
  <button class="btn" onclick="onReset()">Reset</button>
  <button class="btn" onclick="undo()" title="Undo (Ctrl+Z)">↶</button>
  <button class="btn" onclick="redo()" title="Redo (Ctrl+Y)">↷</button>
  <label class="grid-label">
    <input type="checkbox" id="grid-toggle" onchange="toggleGrid(this.checked)">
    Grid
  </label>
  <label class="snap-label">
    <input type="checkbox" id="snap-toggle" onchange="toggleSnap(this.checked)">
    Snap
  </label>
  <div class="toolbar-sep"></div>
  <button class="btn" onclick="openSourcesPanel()">Sources</button>
  <div class="toolbar-sep"></div>
  <span id="status-msg"></span>
</div>

<!-- ── Main ── -->
<div id="main">

  <!-- Left palette panel -->
  <div id="palette">
    <div class="palette-section-header">PLUGINS</div>
    <div id="plugin-list"><p class="no-sel">Loading...</p></div>
    <div class="palette-section-header" style="margin-top:12px">STATIC</div>
    <div id="static-list">
      <div class="palette-item"
           draggable="true"
           ondragstart="onPaletteDragStart(event, {type:'title'})"
           onclick="onStaticClick('title')">
        <div class="palette-item-name">Title</div>
      </div>
      <div class="palette-item"
           draggable="true"
           ondragstart="onPaletteDragStart(event, {type:'datetime'})"
           onclick="onStaticClick('datetime')">
        <div class="palette-item-name">DateTime</div>
      </div>
      <div class="palette-item"
           draggable="true"
           ondragstart="onPaletteDragStart(event, {type:'divider'})"
           onclick="onStaticClick('divider')">
        <div class="palette-item-name">Divider</div>
      </div>
      <div class="palette-item"
           draggable="true"
           ondragstart="onPaletteDragStart(event, {type:'data_field'})"
           onclick="onStaticClick('data_field')">
        <div class="palette-item-name">Data Field</div>
      </div>
    </div>
  </div>

  <!-- Right area -->
  <div id="right">

    <!-- Canvas area -->
    <div id="canvas-area">
      <div id="canvas-outer">
        <div id="canvas"
             ondragover="onCanvasDragOver(event)"
             ondragleave="onCanvasDragLeave(event)"
             ondrop="onCanvasDrop(event)"
             onmousedown="onCanvasMouseDown(event)">
        </div>
      </div>
    </div>

    <!-- Properties panel -->
    <div id="properties">
      <p class="no-sel">No element selected. Click an element on the canvas.</p>
    </div>

  </div>
</div>

<!-- ── Toast notifications ── -->
<div id="toast-container"></div>

<!-- ── Preview overlay ── -->
<div id="preview-area" class="hidden">
  <div id="preview-box">
    <img id="preview-img" alt="Layout preview">
    <div id="preview-close">
      <button class="btn" onclick="closePreview()">Close</button>
    </div>
  </div>
</div>

<!-- ── Text modal ── -->
<div id="text-modal" class="hidden">
  <div id="text-modal-box">
    <h3>Add Text Element</h3>
    <label>Text content</label>
    <input type="text" id="modal-text" placeholder="Enter text...">
    <label>Font size (px)</label>
    <input type="number" id="modal-fontsize" value="24" min="8" max="200">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="submitTextModal()">Add</button>
      <button class="btn" onclick="cancelTextModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Data Field modal ── -->
<div id="datafield-modal" class="hidden">
  <div id="text-modal-box">
    <h3>Add Data Field</h3>
    <label>Source</label>
    <select id="df-modal-source" onchange="onDfSourceChange(this.value)">
      <option value="">Loading...</option>
    </select>
    <label>JSONPath</label>
    <input type="text" id="df-modal-jsonpath" placeholder="$.water_level_ft">
    <label>Label</label>
    <input type="text" id="df-modal-label" placeholder="Water Level">
    <label>Format string</label>
    <input type="text" id="df-modal-format" value="{{value}}" placeholder="{{value}} ft">
    <label>Font size (px)</label>
    <input type="number" id="df-modal-fontsize" value="24" min="8" max="200">
    <div class="modal-btns">
      <button class="btn btn-primary" onclick="submitDataFieldModal()">Add</button>
      <button class="btn" onclick="cancelDataFieldModal()">Cancel</button>
    </div>
    <div id="df-explorer-inline" class="hidden"></div>
  </div>
</div>

<!-- ── JSON Explorer modal (standalone) ── -->
<div id="json-explorer-modal" class="hidden">
  <div id="json-explorer-box">
    <h3 id="json-explorer-title">Browse Fields</h3>
    <div id="json-tree-container">
      <div id="json-explorer-empty">No data loaded.</div>
    </div>
    <div style="margin-top:12px; display:flex; gap:8px; flex-shrink:0;">
      <button class="btn" id="json-explorer-fetch-btn" onclick="explorerFetchNow()" style="display:none">Fetch Now</button>
      <div style="flex:1"></div>
      <button class="btn" onclick="closeJsonExplorer()">Close</button>
    </div>
  </div>
</div>

<!-- ── Sources panel overlay ── -->
<div id="sources-panel" class="hidden" style="
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  display:flex; align-items:center; justify-content:center; z-index:1001;
">
  <div style="
    background:#161b22; border:1px solid #30363d; border-radius:8px;
    width:700px; max-height:80vh; overflow-y:auto; padding:20px;
  ">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h3 style="color:#58a6ff; margin:0;">Data Sources</h3>
      <div>
        <button class="btn btn-primary" onclick="showAddSourceForm()">+ Add Source</button>
        <button class="btn btn-primary" onclick="showPresetPicker()" style="background:#238636;">+ From Preset</button>
        <button class="btn" onclick="closeSourcesPanel()">Close</button>
      </div>
    </div>

    <!-- Source list -->
    <div id="sources-list"></div>

    <!-- Add/Edit source form (hidden by default) -->
    <div id="source-form" style="display:none; margin-top:16px; border-top:1px solid #30363d; padding-top:16px;">
      <h4 id="source-form-title" style="color:#79c0ff; margin-bottom:12px;">Add Source</h4>
      <input type="hidden" id="sf-id" value="">
      <div style="display:grid; gap:8px;">
        <label style="color:#8b949e;">Name</label>
        <input type="text" id="sf-name" placeholder="My API" style="background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit;">
        <label style="color:#8b949e;">URL</label>
        <input type="text" id="sf-url" placeholder="https://api.example.com/data" style="background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit;">
        <div style="display:flex; gap:12px;">
          <div style="flex:1;">
            <label style="color:#8b949e;">Method</label>
            <select id="sf-method" style="width:100%; background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit;">
              <option value="GET">GET</option>
              <option value="POST">POST</option>
            </select>
          </div>
          <div style="flex:1;">
            <label style="color:#8b949e;">Refresh Interval</label>
            <select id="sf-interval" style="width:100%; background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit;">
              <option value="30">30 seconds</option>
              <option value="60" selected>1 minute</option>
              <option value="120">2 minutes</option>
              <option value="300">5 minutes</option>
              <option value="600">10 minutes</option>
              <option value="900">15 minutes</option>
              <option value="1800">30 minutes</option>
              <option value="3600">1 hour</option>
            </select>
          </div>
        </div>
        <label style="color:#8b949e;">Headers (JSON object)</label>
        <textarea id="sf-headers" rows="3" placeholder='{"Authorization": "Bearer token"}' style="background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit; resize:vertical;"></textarea>
        <label style="color:#8b949e;">Request Body (for POST)</label>
        <textarea id="sf-body" rows="2" placeholder='{"query": "..."}' style="background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit; resize:vertical;"></textarea>
        <label style="color:#8b949e;">Response Root Path (JSONPath, optional)</label>
        <input type="text" id="sf-rootpath" placeholder="$.data.results" style="background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit;">
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="btn btn-primary" onclick="submitSourceForm()">Save</button>
          <button class="btn" onclick="testSourceFetch()">Test Fetch</button>
          <button class="btn" onclick="cancelSourceForm()">Cancel</button>
        </div>
        <pre id="sf-test-result" style="display:none; background:#0d1117; color:#c9d1d9; padding:8px; border-radius:4px; max-height:200px; overflow:auto; font-size:11px; margin-top:8px;"></pre>
      </div>
    </div>

    <!-- Preset picker (hidden by default) -->
    <div id="preset-picker" style="display:none; margin-top:16px; border-top:1px solid #30363d; padding-top:16px;">
      <h4 style="color:#79c0ff; margin-bottom:12px;">Add from Preset</h4>
      <div id="preset-list" style="display:grid; gap:8px;"></div>
      <div id="preset-params-form" style="display:none; margin-top:12px; border-top:1px solid #21262d; padding-top:12px;">
        <h4 id="preset-params-title" style="color:#79c0ff; margin-bottom:8px;"></h4>
        <p id="preset-params-desc" style="color:#8b949e; font-size:12px; margin-bottom:8px;"></p>
        <input type="hidden" id="pp-preset-id" value="">
        <div style="display:grid; gap:8px;">
          <label style="color:#8b949e;">Source Name (optional override)</label>
          <input type="text" id="pp-name" placeholder="Leave blank for default" style="background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit;">
          <div id="pp-fields"></div>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button class="btn btn-primary" onclick="submitPresetForm()">Create Source</button>
            <button class="btn" onclick="cancelPresetForm()">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="sources-panel-hidden" class="hidden"></div>

<script>
// ────────────────────────────────────────
// Constants
// ────────────────────────────────────────
const CANVAS_W = 800;
const CANVAS_H = 480;

// ────────────────────────────────────────
// State
// ────────────────────────────────────────
const state = {
  layouts: [],
  currentLayoutId: null,
  currentLayoutName: null,
  activeLayoutId: null,
  items: [],
  selectedId: null,
  pendingDrop: null,
  history: [],
  historyIndex: -1,
  snapToGrid: false,
};

let canvasScale = 1;
let dragCtx = null;
let resizeCtx = null;
let cachedPlugins = [];

// ────────────────────────────────────────
// Init
// ────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  computeScale();
  window.addEventListener('resize', () => { computeScale(); });
  document.getElementById('modal-text').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitTextModal();
    if (e.key === 'Escape') cancelTextModal();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    // Ctrl+S or Cmd+S = Save
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      onSave();
    }
    // Ctrl+Z or Cmd+Z = Undo
    else if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
      e.preventDefault();
      undo();
    }
    // Ctrl+Y or Cmd+Shift+Z = Redo
    else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) {
      e.preventDefault();
      redo();
    }
    // Delete = Delete selected element
    else if (e.key === 'Delete' && state.selectedId && !isEditingText()) {
      e.preventDefault();
      deleteSelected();
    }
    // Escape = Deselect
    else if (e.key === 'Escape' && state.selectedId) {
      e.preventDefault();
      state.selectedId = null;
      renderCanvas();
      renderProps();
    }
  });

  // Touch support for mobile/tablet
  const canvas = document.getElementById('canvas');
  canvas.addEventListener('touchstart', onCanvasTouchStart, false);
  canvas.addEventListener('touchmove', onCanvasTouchMove, false);
  canvas.addEventListener('touchend', onCanvasTouchEnd, false);

  loadLayouts();
});

// ────────────────────────────────────────
// Canvas scaling
// ────────────────────────────────────────
function computeScale() {
  const area = document.getElementById('canvas-area');
  const pw = area.clientWidth - 40;
  const ph = area.clientHeight - 40;
  canvasScale = Math.min(pw / CANVAS_W, ph / CANVAS_H, 1);
  const canvas = document.getElementById('canvas');
  canvas.style.transform = `scale(${canvasScale})`;
  const outer = document.getElementById('canvas-outer');
  outer.style.width  = Math.round(CANVAS_W * canvasScale) + 'px';
  outer.style.height = Math.round(CANVAS_H * canvasScale) + 'px';
}

function toCanvas(e) {
  const rect = document.getElementById('canvas').getBoundingClientRect();
  return {
    x: Math.round((e.clientX - rect.left) / canvasScale),
    y: Math.round((e.clientY - rect.top)  / canvasScale),
  };
}

// ────────────────────────────────────────
// API helpers
// ────────────────────────────────────────
function apiFetch(url, opts) {
  const o = opts || {};
  const headers = Object.assign({ 'Content-Type': 'application/json' }, o.headers || {});
  return fetch(url, Object.assign({}, o, { headers, credentials: 'same-origin' }));
}

let statusTimer = null;
function setStatus(msg, isError) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.color = isError ? '#f85149' : '#56d364';
  clearTimeout(statusTimer);
  if (msg) statusTimer = setTimeout(() => { el.textContent = ''; }, 3000);
}

// ────────────────────────────────────────
// Toast notifications
// ────────────────────────────────────────
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideIn 0.3s ease-out reverse';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function isEditingText() {
  const modal = document.getElementById('text-modal');
  const dfModal = document.getElementById('datafield-modal');
  return !modal.classList.contains('hidden') || !dfModal.classList.contains('hidden');
}

// ────────────────────────────────────────
// History / Undo-Redo
// ────────────────────────────────────────
function saveHistory() {
  // Remove any future history if we're not at the end
  state.history.splice(state.historyIndex + 1);
  // Save current state (deep copy)
  state.history.push(JSON.parse(JSON.stringify(state.items)));
  // Keep only last 10 states
  if (state.history.length > 10) state.history.shift();
  else state.historyIndex++;
}

function undo() {
  if (state.historyIndex <= 0) {
    showToast('Nothing to undo', 'info');
    return;
  }
  state.historyIndex--;
  state.items = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
  renderCanvas();
  renderProps();
  showToast('Undone', 'success');
}

function redo() {
  if (state.historyIndex >= state.history.length - 1) {
    showToast('Nothing to redo', 'info');
    return;
  }
  state.historyIndex++;
  state.items = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
  renderCanvas();
  renderProps();
  showToast('Redone', 'success');
}

// ────────────────────────────────────────
// Collision detection
// ────────────────────────────────────────
function detectCollisions() {
  const collisions = new Set();
  for (let i = 0; i < state.items.length; i++) {
    for (let j = i + 1; j < state.items.length; j++) {
      const a = state.items[i];
      const b = state.items[j];
      // Check if rectangles overlap
      if (a.x < b.x + b.w && a.x + a.w > b.x &&
          a.y < b.y + b.h && a.y + a.h > b.y) {
        collisions.add(a.id);
        collisions.add(b.id);
      }
    }
  }
  return collisions;
}

function updateCollisionIndicators() {
  const collisions = detectCollisions();
  state.items.forEach(item => {
    const el = document.querySelector('#canvas [data-id="' + item.id + '"]');
    if (el) {
      el.classList.toggle('collision', collisions.has(item.id));
    }
  });
}

function toggleSnap(on) {
  state.snapToGrid = on;
}

// ────────────────────────────────────────
// Layout management
// ────────────────────────────────────────
async function newLayout() {
  const name = prompt('Layout name:', 'New Layout');
  if (!name) return;
  try {
    const res = await apiFetch('/api/admin/layout', {
      method: 'POST',
      body: JSON.stringify({ name: name, items: [] }),
    });
    if (!res.ok) {
      showToast('Failed to create layout', 'error');
      return;
    }
    const layout = await res.json();
    state.layouts.push(layout);
    await loadLayout(layout.id);
    updateLayoutSelector();
    showToast('Layout created', 'success');
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function duplicateLayout() {
  if (!state.currentLayoutId) return;
  try {
    const name = prompt('New layout name:', state.currentLayoutName + ' (copy)');
    if (!name) return;
    const res = await apiFetch('/api/admin/layout', {
      method: 'POST',
      body: JSON.stringify({ name: name, items: itemsToPayload(state.items) }),
    });
    if (!res.ok) {
      showToast('Failed to duplicate layout', 'error');
      return;
    }
    const layout = await res.json();
    state.layouts.push(layout);
    updateLayoutSelector();
    showToast('Layout duplicated', 'success');
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function deleteLayout() {
  if (!state.currentLayoutId) return;
  if (!confirm('Delete this layout? This cannot be undone.')) return;
  try {
    const res = await apiFetch('/api/admin/layout/' + encodeURIComponent(state.currentLayoutId), {
      method: 'DELETE',
    });
    if (!res.ok) {
      showToast('Failed to delete layout', 'error');
      return;
    }
    state.layouts = state.layouts.filter(l => l.id !== state.currentLayoutId);
    updateLayoutSelector();
    if (state.layouts.length) await loadLayout(state.layouts[0].id);
    showToast('Layout deleted', 'success');
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function updateLayoutSelector() {
  const sel = document.getElementById('layout-select');
  sel.innerHTML = state.layouts.map(l =>
    '<option value="' + esc(l.id) + '">' +
      esc(l.name) + (l.id === state.activeLayoutId ? ' \u2713' : '') +
    '</option>'
  ).join('');
  if (state.layouts.length) {
    sel.value = state.currentLayoutId;
  }
  updateLayoutNameEditor();
  updateActiveBadge();
}

function updateLayoutNameEditor() {
  const ed = document.getElementById('layout-name-editor');
  if (state.currentLayoutName) {
    ed.textContent = state.currentLayoutName;
  }
}

function startEditLayoutName() {
  const ed = document.getElementById('layout-name-editor');
  ed.classList.add('editing');
  const input = document.createElement('input');
  input.type = 'text';
  input.value = state.currentLayoutName || '';
  ed.textContent = '';
  ed.appendChild(input);
  input.focus();
  input.select();

  function finishEdit(save) {
    ed.classList.remove('editing');
    if (save && input.value.trim()) {
      state.currentLayoutName = input.value.trim();
      onSave();
    }
    ed.textContent = state.currentLayoutName || '';
  }

  input.addEventListener('blur', () => finishEdit(true));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') finishEdit(true);
    if (e.key === 'Escape') finishEdit(false);
  });
}

// ────────────────────────────────────────
// Deploy (set active layout)
// ────────────────────────────────────────
async function deployLayout() {
  if (!state.currentLayoutId) return;
  try {
    await onSave();
    const res = await apiFetch('/api/admin/active-layout', {
      method: 'PUT',
      body: JSON.stringify({ layout_id: state.currentLayoutId }),
    });
    if (!res.ok) {
      showToast('Deploy failed: ' + res.status, 'error');
      return;
    }
    state.activeLayoutId = state.currentLayoutId;
    updateActiveBadge();
    updateLayoutSelector();
    showToast('Layout deployed to display!', 'success');
  } catch (e) {
    showToast('Deploy error: ' + e.message, 'error');
  }
}

function updateActiveBadge() {
  const badge = document.getElementById('active-badge');
  const deployBtn = document.getElementById('deploy-btn');
  if (state.currentLayoutId && state.currentLayoutId === state.activeLayoutId) {
    badge.style.display = '';
    deployBtn.textContent = 'Deployed';
    deployBtn.classList.remove('btn-primary');
    deployBtn.classList.add('btn');
  } else {
    badge.style.display = 'none';
    deployBtn.textContent = 'Deploy';
    deployBtn.classList.remove('btn');
    deployBtn.classList.add('btn-primary');
  }
}

// ────────────────────────────────────────
// Load layouts + plugins
// ────────────────────────────────────────
async function loadLayouts() {
  try {
    const [layoutsRes, activeRes] = await Promise.all([
      apiFetch('/api/admin/layouts'),
      apiFetch('/api/admin/active-layout'),
    ]);
    if (!layoutsRes.ok) { setStatus('Layouts: ' + layoutsRes.status, true); return; }
    state.layouts = await layoutsRes.json();
    if (activeRes.ok) {
      const activeData = await activeRes.json();
      state.activeLayoutId = activeData.layout_id || null;
    }
    updateLayoutSelector();
    if (state.layouts.length) await loadLayout(state.layouts[0].id);
    loadPlugins();
  } catch (e) {
    setStatus(e.message, true);
  }
}

async function loadLayout(id) {
  try {
    const res = await apiFetch('/api/admin/layout/' + encodeURIComponent(id));
    if (!res.ok) { setStatus('Layout: ' + res.status, true); return; }
    const layout = await res.json();
    state.currentLayoutId = layout.id;
    state.currentLayoutName = layout.name;
    state.items = apiToItems(layout.items || []);
    state.selectedId = null;
    // Reset history for new layout
    state.history = [JSON.parse(JSON.stringify(state.items))];
    state.historyIndex = 0;
    // Update selector to reflect current layout
    const sel = document.getElementById('layout-select');
    if (sel) sel.value = layout.id;
    updateLayoutNameEditor();
    updateActiveBadge();
    renderCanvas();
    renderProps();
    setStatus('');
  } catch (e) {
    setStatus(e.message, true);
  }
}

async function loadPlugins() {
  try {
    const res = await apiFetch('/api/admin/plugins');
    if (!res.ok) {
      document.getElementById('plugin-list').innerHTML =
        '<p class="no-sel" style="color:red">Failed to load plugins (' + res.status + ') — check API key</p>';
      return;
    }
    var plugins = await res.json();
    cachedPlugins = plugins;
    buildPalette(plugins);
  } catch (e) {
    document.getElementById('plugin-list').innerHTML =
      '<p class="no-sel" style="color:red">Error loading plugins: ' + e.message + '</p>';
  }
}

function onLayoutChange(id) { loadLayout(id); }

// ────────────────────────────────────────
// Item conversion
// ────────────────────────────────────────
function apiToItems(apiItems) {
  return apiItems.map(function(item) {
    return {
      id:               item.id,
      type:             item.type,
      z_index:          item.z_index  != null ? item.z_index : 0,
      x:                item.x        != null ? item.x       : 0,
      y:                item.y        != null ? item.y       : 0,
      w:                item.width    != null ? item.width   : 100,
      h:                item.height   != null ? item.height  : 100,
      plugin_id:        item.plugin_instance_id  || '',
      variant:          item.layout_variant      || 'full',
      text:             item.text_content        || '',
      font_size:        item.font_size           || 24,
      format:           item.text_content        || '',
      orientation:      item.orientation         || 'horizontal',
      field_mapping_id: item.field_mapping_id    || '',
      format_string:    item.format_string       || '{{value}}',
      label:            item.label               || '',
      bold:             !!item.bold,
      italic:           !!item.italic,
      underline:        !!item.underline,
      font_family:      item.font_family         || '',
    };
  });
}

function itemsToPayload(items) {
  return items.map(function(item) {
    const isTextLike = item.type === 'static_text' || item.type === 'static_datetime' || item.type === 'data_field';
    return {
      id:                  item.id,
      item_type:           item.type,
      z_index:             item.z_index,
      x:                   item.x,
      y:                   item.y,
      width:               item.w,
      height:              item.h,
      plugin_instance_id:  item.type === 'plugin_slot'   ? item.plugin_id  : null,
      layout_variant:      item.type === 'plugin_slot'   ? item.variant    : null,
      text_content:        item.type === 'static_text'   ? item.text
                           : item.type === 'static_datetime' ? item.format : null,
      font_size:           isTextLike ? item.font_size : null,
      orientation:         (item.type === 'static_divider' || item.type === 'static_text' || item.type === 'static_datetime')
                             ? item.orientation : null,
      field_mapping_id:    item.type === 'data_field'    ? item.field_mapping_id : null,
      format_string:       item.type === 'data_field'    ? item.format_string    : null,
      label:               item.type === 'data_field'    ? (item.label || null)  : null,
      bold:                isTextLike ? !!item.bold      : null,
      italic:              isTextLike ? !!item.italic    : null,
      underline:           isTextLike ? !!item.underline : null,
      font_family:         isTextLike ? (item.font_family || null) : null,
    };
  });
}

// ────────────────────────────────────────
// Toolbar actions
// ────────────────────────────────────────
async function onSave() {
  if (!state.currentLayoutId) return;
  try {
    const body = { name: state.currentLayoutName || state.currentLayoutId, items: itemsToPayload(state.items) };
    const res = await apiFetch('/api/admin/layout/' + encodeURIComponent(state.currentLayoutId), {
      method: 'PUT',
      body: JSON.stringify(body),
    });
    if (res.ok) setStatus('Saved');
    else setStatus('Save failed: ' + res.status, true);
  } catch (e) { setStatus(e.message, true); }
}

async function onReset() {
  if (state.currentLayoutId) await loadLayout(state.currentLayoutId);
}

async function onPreview() {
  if (!state.currentLayoutId) return;
  await onSave();
  try {
    const res = await apiFetch('/api/admin/preview/' + encodeURIComponent(state.currentLayoutId), { method: 'POST' });
    if (!res.ok) { setStatus('Preview failed: ' + res.status, true); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const img = document.getElementById('preview-img');
    if (img.src) URL.revokeObjectURL(img.src);
    img.src = url;
    document.getElementById('preview-area').classList.remove('hidden');
  } catch (e) { setStatus(e.message, true); }
}

function closePreview() {
  document.getElementById('preview-area').classList.add('hidden');
}

function toggleGrid(on) {
  document.getElementById('canvas').classList.toggle('grid-on', on);
}

// ────────────────────────────────────────
// Plugin palette
// ────────────────────────────────────────
function buildPalette(plugins) {
  const ABBREV = { full: 'full', half_horizontal: 'h\u00bd', half_vertical: 'v\u00bd', quadrant: 'q' };
  document.getElementById('plugin-list').innerHTML = plugins.map(function(p) {
    const safeName = esc(p.name || p.id);
    const safeId = esc(p.id);
    const variants = (p.supported_variants || ['full']).map(function(v) {
      return '<button class="variant-btn" onclick="event.stopPropagation();quickAdd(\'' +
        safeId + '\',\'' + v + '\')" title="Add ' + safeId + ' (' + v + ')">' +
        (ABBREV[v] || v) + '</button>';
    }).join('');
    var browseBtn = '<button class="variant-btn" onclick="event.stopPropagation();openJsonExplorer(\'' +
      safeId + '\')" title="Browse JSON fields for ' + safeName + '">\uD83D\uDD0D fields</button>';
    return '<div class="palette-item" draggable="true"' +
      ' ondragstart="onPaletteDragStart(event,{type:\'plugin\',id:\'' + safeId + '\',variant:\'full\'})">' +
      '<div class="palette-item-name">' + safeName + '</div>' +
      '<div class="palette-variants">' + variants + ' ' + browseBtn + '</div></div>';
  }).join('');
}

function quickAdd(pluginId, variant) {
  const x = Math.max(0, Math.min(CANVAS_W - 200, 20 + state.items.length * 10));
  const y = Math.max(0, Math.min(CANVAS_H - 150, 20 + state.items.length * 10));
  pushItem({ id: uid(), type: 'plugin_slot', z_index: nextZ(), x: x, y: y, w: 200, h: 150,
             plugin_id: pluginId, variant: variant, text: '', font_size: 24, orientation: 'horizontal' });
  selectItem(state.items[state.items.length - 1].id);
}

// ────────────────────────────────────────
// Palette drag events
// ────────────────────────────────────────
function onPaletteDragStart(e, data) {
  e.dataTransfer.setData('application/json', JSON.stringify(data));
  e.dataTransfer.effectAllowed = 'copy';
}

function onCanvasDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  document.getElementById('canvas').classList.add('drag-over');
}

function onCanvasDragLeave() {
  document.getElementById('canvas').classList.remove('drag-over');
}

function onCanvasDrop(e) {
  e.preventDefault();
  document.getElementById('canvas').classList.remove('drag-over');
  let data;
  try { data = JSON.parse(e.dataTransfer.getData('application/json') || 'null'); } catch { return; }
  if (!data) return;
  const c = toCanvas(e);
  if (data.type === 'plugin') {
    pushItem({ id: uid(), type: 'plugin_slot', z_index: nextZ(), x: c.x, y: c.y, w: 200, h: 150,
               plugin_id: data.id, variant: data.variant || 'full', text: '', font_size: 24, orientation: 'horizontal' });
    selectItem(state.items[state.items.length - 1].id);
  } else if (data.type === 'title') {
    state.pendingDrop = c;
    showTextModal();
  } else if (data.type === 'datetime') {
    pushItem({ id: uid(), type: 'static_datetime', z_index: nextZ(), x: c.x, y: c.y, w: 200, h: 40,
               plugin_id: '', variant: 'full', text: '', font_size: 16, format: '', orientation: 'horizontal' });
    selectItem(state.items[state.items.length - 1].id);
  } else if (data.type === 'divider') {
    pushItem({ id: uid(), type: 'static_divider', z_index: nextZ(), x: 0, y: c.y, w: CANVAS_W, h: 4,
               plugin_id: '', variant: 'full', text: '', font_size: 24, orientation: 'horizontal' });
    selectItem(state.items[state.items.length - 1].id);
  } else if (data.type === 'data_field') {
    state.pendingDrop = c;
    showDataFieldModal();
  }
}

function onStaticClick(type) {
  const cx = Math.floor(CANVAS_W / 2 - 150);
  const cy = Math.floor(CANVAS_H / 2 - 30);
  if (type === 'title') {
    state.pendingDrop = { x: cx, y: cy };
    showTextModal();
  } else if (type === 'datetime') {
    pushItem({ id: uid(), type: 'static_datetime', z_index: nextZ(), x: cx, y: cy, w: 200, h: 40,
               plugin_id: '', variant: 'full', text: '', font_size: 16, format: '', orientation: 'horizontal' });
    selectItem(state.items[state.items.length - 1].id);
  } else if (type === 'data_field') {
    state.pendingDrop = { x: cx, y: cy };
    showDataFieldModal();
  } else {
    pushItem({ id: uid(), type: 'static_divider', z_index: nextZ(), x: 0, y: cy, w: CANVAS_W, h: 4,
               plugin_id: '', variant: 'full', text: '', font_size: 24, orientation: 'horizontal' });
    selectItem(state.items[state.items.length - 1].id);
  }
}

// ────────────────────────────────────────
// Canvas mouse events
// ────────────────────────────────────────
function onCanvasMouseDown(e) {
  if (e.target.classList.contains('resize-handle')) {
    const itemEl = e.target.closest('.canvas-item');
    const itemId = itemEl && itemEl.dataset.id;
    const handle = e.target.dataset.handle;
    if (!itemId || !handle) return;
    const item = findItem(itemId);
    if (!item) return;
    e.preventDefault();
    e.stopPropagation();
    const c = toCanvas(e);
    resizeCtx = { itemId: itemId, handle: handle, sx: c.x, sy: c.y, ox: item.x, oy: item.y, ow: item.w, oh: item.h };
    document.addEventListener('mousemove', onResizeMove);
    document.addEventListener('mouseup', onResizeUp);
    return;
  }

  const itemEl = e.target.closest && e.target.closest('.canvas-item');
  if (itemEl) {
    const itemId = itemEl.dataset.id;
    if (!itemId) return;
    e.preventDefault();
    selectItem(itemId);
    const item = findItem(itemId);
    if (!item) return;
    const c = toCanvas(e);
    dragCtx = { itemId: itemId, sx: c.x, sy: c.y, ox: item.x, oy: item.y };
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragUp);
    return;
  }

  // Click on empty canvas — deselect
  state.selectedId = null;
  renderCanvas();
  renderProps();
}

function onDragMove(e) {
  if (!dragCtx) return;
  const c = toCanvas(e);
  const item = findItem(dragCtx.itemId);
  if (!item) return;
  let x = clamp(dragCtx.ox + c.x - dragCtx.sx, 0, CANVAS_W - item.w);
  let y = clamp(dragCtx.oy + c.y - dragCtx.sy, 0, CANVAS_H - item.h);
  // Apply snap-to-grid if enabled
  if (state.snapToGrid) {
    x = Math.round(x / 10) * 10;
    y = Math.round(y / 10) * 10;
  }
  item.x = x;
  item.y = y;
  const el = document.querySelector('#canvas [data-id="' + dragCtx.itemId + '"]');
  if (el) { el.style.left = item.x + 'px'; el.style.top = item.y + 'px'; }
}

function onDragUp() {
  saveHistory();
  dragCtx = null;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragUp);
  updateCollisionIndicators();
  renderProps();
}

function onResizeMove(e) {
  if (!resizeCtx) return;
  const c = toCanvas(e);
  const dx = c.x - resizeCtx.sx;
  const dy = c.y - resizeCtx.sy;
  const item = findItem(resizeCtx.itemId);
  if (!item) return;
  const h = resizeCtx.handle;
  if (h.indexOf('e') >= 0) { item.w = Math.max(10, resizeCtx.ow + dx); }
  if (h.indexOf('s') >= 0) { item.h = Math.max(10, resizeCtx.oh + dy); }
  if (h.indexOf('w') >= 0) {
    const nw = Math.max(10, resizeCtx.ow - dx);
    item.x = resizeCtx.ox + resizeCtx.ow - nw;
    item.w = nw;
  }
  if (h.indexOf('n') >= 0) {
    const nh = Math.max(10, resizeCtx.oh - dy);
    item.y = resizeCtx.oy + resizeCtx.oh - nh;
    item.h = nh;
  }
  const el = document.querySelector('#canvas [data-id="' + resizeCtx.itemId + '"]');
  if (el) {
    el.style.left   = item.x + 'px';
    el.style.top    = item.y + 'px';
    el.style.width  = item.w + 'px';
    el.style.height = item.h + 'px';
  }
}

function onResizeUp() {
  saveHistory();
  resizeCtx = null;
  document.removeEventListener('mousemove', onResizeMove);
  document.removeEventListener('mouseup', onResizeUp);
  updateCollisionIndicators();
  renderCanvas();
  renderProps();
}

function selectItem(id) {
  state.selectedId = id;
  renderCanvas();
  renderProps();
}

// ────────────────────────────────────────
// Touch events (mobile/tablet support)
// ────────────────────────────────────────
let touchCtx = null;

function onCanvasTouchStart(e) {
  if (e.touches.length !== 1) return;
  const touch = e.touches[0];
  const itemEl = document.elementFromPoint(touch.clientX, touch.clientY).closest('.canvas-item');
  if (!itemEl) {
    // Touch on empty canvas — deselect
    state.selectedId = null;
    renderCanvas();
    renderProps();
    return;
  }
  const itemId = itemEl.dataset.id;
  if (!itemId) return;
  e.preventDefault();
  selectItem(itemId);
  const item = findItem(itemId);
  if (!item) return;
  const c = toucCanvasCoords(touch);
  touchCtx = { itemId: itemId, sx: c.x, sy: c.y, ox: item.x, oy: item.y };
}

function onCanvasTouchMove(e) {
  if (!touchCtx || e.touches.length !== 1) return;
  e.preventDefault();
  const touch = e.touches[0];
  const c = toucCanvasCoords(touch);
  const item = findItem(touchCtx.itemId);
  if (!item) return;
  let x = clamp(touchCtx.ox + c.x - touchCtx.sx, 0, CANVAS_W - item.w);
  let y = clamp(touchCtx.oy + c.y - touchCtx.sy, 0, CANVAS_H - item.h);
  if (state.snapToGrid) {
    x = Math.round(x / 10) * 10;
    y = Math.round(y / 10) * 10;
  }
  item.x = x;
  item.y = y;
  const el = document.querySelector('#canvas [data-id="' + touchCtx.itemId + '"]');
  if (el) { el.style.left = item.x + 'px'; el.style.top = item.y + 'px'; }
}

function onCanvasTouchEnd(e) {
  if (!touchCtx) return;
  saveHistory();
  touchCtx = null;
  updateCollisionIndicators();
  renderProps();
}

function toucCanvasCoords(touch) {
  const rect = document.getElementById('canvas').getBoundingClientRect();
  return {
    x: Math.round((touch.clientX - rect.left) / canvasScale),
    y: Math.round((touch.clientY - rect.top) / canvasScale),
  };
}

// ────────────────────────────────────────
// Canvas rendering
// ────────────────────────────────────────
function renderCanvas() {
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  const sorted = state.items.slice().sort(function(a, b) { return a.z_index - b.z_index; });
  sorted.forEach(function(item) { canvas.appendChild(makeEl(item)); });
  updateCollisionIndicators();
}

const COLORS = {
  plugin_slot:     { bg: 'rgba(31,107,235,0.22)',  border: '#1f6feb' },
  static_text:     { bg: 'rgba(63,185,80,0.18)',   border: '#3fb950' },
  static_datetime: { bg: 'rgba(136,100,232,0.22)', border: '#8864e8' },
  static_divider:  { bg: 'rgba(210,153,34,0.22)',  border: '#d29922' },
  data_field:      { bg: 'rgba(240,136,62,0.22)',   border: '#f0883e' },
};

function makeEl(item) {
  const el = document.createElement('div');
  el.className = 'canvas-item' + (item.id === state.selectedId ? ' selected' : '');
  el.dataset.id = item.id;
  const col = COLORS[item.type] || { bg: '#21262d', border: '#30363d' };
  el.style.cssText =
    'left:' + item.x + 'px;top:' + item.y + 'px;' +
    'width:' + item.w + 'px;height:' + item.h + 'px;' +
    'z-index:' + item.z_index + ';' +
    'background:' + col.bg + ';border:1px solid ' + col.border + ';';

  const label = document.createElement('span');
  label.className = 'item-label';
  if (item.type === 'static_text') {
    label.style.fontSize = (item.font_size || 24) + 'px';
  } else if (item.type === 'static_datetime') {
    label.style.fontSize = (item.font_size || 16) + 'px';
  } else if (item.type === 'data_field') {
    label.style.fontSize = (item.font_size || 24) + 'px';
  }
  if (item.type === 'static_text' || item.type === 'static_datetime' || item.type === 'data_field') {
    if (item.bold)      label.style.fontWeight = 'bold';
    if (item.italic)    label.style.fontStyle = 'italic';
    if (item.underline) label.style.textDecoration = 'underline';
    if (item.font_family) label.style.fontFamily = item.font_family;
  }
  label.textContent = itemLabel(item);
  el.appendChild(label);

  if (item.id === state.selectedId) {
    ['nw','n','ne','e','se','s','sw','w'].forEach(function(h) {
      const handle = document.createElement('div');
      handle.className = 'resize-handle resize-' + h;
      handle.dataset.handle = h;
      el.appendChild(handle);
    });
  }
  return el;
}

function itemLabel(item) {
  if (item.type === 'plugin_slot')    return (item.plugin_id || '?') + ' (' + (item.variant || 'full') + ')';
  if (item.type === 'static_text')    return (item.text || 'Text') + ' (' + (item.font_size || 24) + 'px)';
  if (item.type === 'static_datetime') return '\u{1F552} DateTime (' + (item.font_size || 16) + 'px)';
  if (item.type === 'static_divider') return 'Divider (' + (item.orientation || 'horizontal') + ')';
  if (item.type === 'data_field') {
    var lbl = item.label || item.format_string || '{{value}}';
    return lbl + ' (' + (item.font_size || 24) + 'px)';
  }
  return item.type;
}

// ────────────────────────────────────────
// Properties panel
// ────────────────────────────────────────
function renderProps() {
  const panel = document.getElementById('properties');
  const item = findItem(state.selectedId);
  if (!item) {
    panel.innerHTML = '<p class="no-sel">No element selected. Click an element on the canvas.</p>';
    return;
  }

  let typeFields = '';
  if (item.type === 'plugin_slot') {
    const opts = ['full','half_horizontal','half_vertical','quadrant'].map(function(v) {
      return '<option value="' + v + '"' + (v === item.variant ? ' selected' : '') + '>' + v + '</option>';
    }).join('');
    typeFields =
      '<label>Variant</label>' +
      '<select onchange="updateProp(\'variant\',this.value)">' + opts + '</select>' +
      '<label>Plugin ID</label>' +
      '<input type="text" value="' + esc(item.plugin_id) + '" oninput="updateProp(\'plugin_id\',this.value)">';
  } else if (item.type === 'static_text') {
    typeFields =
      '<label>Text</label>' +
      '<input type="text" value="' + esc(item.text) + '" oninput="updateProp(\'text\',this.value)">' +
      '<label>Font size</label>' +
      '<input type="number" value="' + item.font_size + '" min="8" max="200" onchange="updateProp(\'font_size\',+this.value)">' +
      textFormatFields(item);
  } else if (item.type === 'static_datetime') {
    typeFields =
      '<label>Format</label>' +
      '<input type="text" value="' + esc(item.format || '') + '" placeholder="default" oninput="updateProp(\'format\',this.value)">' +
      '<label>Font size</label>' +
      '<input type="number" value="' + item.font_size + '" min="8" max="200" onchange="updateProp(\'font_size\',+this.value)">' +
      textFormatFields(item);
  } else if (item.type === 'static_divider') {
    const opts = ['horizontal','vertical'].map(function(o) {
      return '<option value="' + o + '"' + ((item.orientation || 'horizontal') === o ? ' selected' : '') + '>' + o + '</option>';
    }).join('');
    typeFields =
      '<label>Orientation</label>' +
      '<select onchange="updateProp(\'orientation\',this.value)">' + opts + '</select>';
  } else if (item.type === 'data_field') {
    typeFields =
      '<label>Source</label>' +
      '<input type="text" value="' + esc(item.source_id || '') + '" readonly style="opacity:0.6">' +
      '<label>JSONPath</label>' +
      '<input type="text" value="' + esc(item.json_path || '') + '" readonly style="opacity:0.6">' +
      '<label>Format</label>' +
      '<input type="text" value="' + esc(item.format_string || '{{value}}') + '" oninput="updateProp(\'format_string\',this.value)">' +
      '<label>Label</label>' +
      '<input type="text" value="' + esc(item.label || '') + '" oninput="updateProp(\'label\',this.value)">' +
      '<label>Font size</label>' +
      '<input type="number" value="' + item.font_size + '" min="8" max="200" onchange="updateProp(\'font_size\',+this.value)">' +
      textFormatFields(item);
  }

  const label = item.type === 'plugin_slot' ? (item.plugin_id || '?') + ' (plugin_slot)' : item.type;
  panel.innerHTML =
    '<div class="prop-header">Element: ' + esc(label) + '</div>' +
    '<div class="prop-grid">' +
      '<label>x</label><input type="number" value="' + item.x + '" onchange="updatePropRender(\'x\',+this.value)">' +
      '<label>y</label><input type="number" value="' + item.y + '" onchange="updatePropRender(\'y\',+this.value)">' +
      '<label>w</label><input type="number" value="' + item.w + '" min="1" onchange="updatePropRender(\'w\',+this.value)">' +
      '<label>h</label><input type="number" value="' + item.h + '" min="1" onchange="updatePropRender(\'h\',+this.value)">' +
      '<label>z-index</label><input type="number" value="' + item.z_index + '" onchange="updatePropRender(\'z_index\',+this.value)">' +
      typeFields +
    '</div>' +
    '<div style="margin-top:10px; display: flex; gap: 8px;">' +
      '<button class="btn" onclick="bringForward()" title="Bring forward (z-index)">↑ Front</button>' +
      '<button class="btn" onclick="sendBack()" title="Send back (z-index)">↓ Back</button>' +
      '<button class="btn btn-danger" onclick="deleteSelected()" style="flex: 1;">Delete</button>' +
    '</div>';
}

// Sensible set of fonts for e-ink rendering.  Generic families first
// (always available in the sidecar's browser), then widely-shipped named
// fonts that render well at low DPI.
const FONT_FAMILIES = [
  { value: '',                label: 'Default (sans-serif)' },
  { value: 'sans-serif',      label: 'Sans-serif' },
  { value: 'serif',           label: 'Serif' },
  { value: 'monospace',       label: 'Monospace' },
  { value: 'Georgia, serif',  label: 'Georgia' },
  { value: 'Helvetica, Arial, sans-serif', label: 'Helvetica / Arial' },
  { value: 'Times New Roman, serif',       label: 'Times New Roman' },
  { value: 'Courier New, monospace',       label: 'Courier New' },
  { value: 'Verdana, sans-serif',          label: 'Verdana' },
];

function textFormatFields(item) {
  const fontOpts = FONT_FAMILIES.map(function(f) {
    return '<option value="' + esc(f.value) + '"' +
      ((item.font_family || '') === f.value ? ' selected' : '') + '>' + esc(f.label) + '</option>';
  }).join('');
  const btn = function(key, label, title) {
    const pressed = !!item[key];
    const style = pressed
      ? 'background:#58a6ff;color:#0d1117;font-weight:bold;'
      : 'background:#21262d;color:#c9d1d9;';
    return '<button type="button" title="' + title + '" ' +
      'style="' + style + 'border:1px solid #30363d;border-radius:4px;' +
      'padding:4px 10px;font-size:12px;cursor:pointer;min-width:32px;" ' +
      'onclick="toggleProp(\'' + key + '\')">' + label + '</button>';
  };
  return '<label>Format</label>' +
    '<div style="display:flex;gap:4px;">' +
      btn('bold',      '<b>B</b>', 'Bold') +
      btn('italic',    '<i>I</i>', 'Italic') +
      btn('underline', '<u>U</u>', 'Underline') +
    '</div>' +
    '<label>Font</label>' +
    '<select onchange="updateProp(\'font_family\',this.value)">' + fontOpts + '</select>';
}

function updateProp(key, value) {
  const item = findItem(state.selectedId);
  if (!item) return;
  item[key] = value;
  renderCanvas();
}

function toggleProp(key) {
  const item = findItem(state.selectedId);
  if (!item) return;
  item[key] = !item[key];
  renderCanvas();
  renderProps();
}

function updatePropRender(key, value) {
  const item = findItem(state.selectedId);
  if (!item) return;
  saveHistory();
  item[key] = value;
  updateCollisionIndicators();
  renderCanvas();
}

function deleteSelected() {
  saveHistory();
  state.items = state.items.filter(function(i) { return i.id !== state.selectedId; });
  state.selectedId = null;
  updateCollisionIndicators();
  renderCanvas();
  renderProps();
}

function bringForward() {
  const item = findItem(state.selectedId);
  if (!item) return;
  saveHistory();
  const maxZ = Math.max.apply(null, state.items.map(function(i) { return i.z_index; })) || 0;
  item.z_index = Math.max(item.z_index + 1, maxZ + 1);
  renderCanvas();
  renderProps();
}

function sendBack() {
  const item = findItem(state.selectedId);
  if (!item) return;
  saveHistory();
  item.z_index = Math.max(0, item.z_index - 1);
  renderCanvas();
  renderProps();
}

// ────────────────────────────────────────
// Text modal
// ────────────────────────────────────────
function showTextModal() {
  document.getElementById('text-modal').classList.remove('hidden');
  document.getElementById('modal-text').value = '';
  document.getElementById('modal-fontsize').value = '24';
  setTimeout(function() { document.getElementById('modal-text').focus(); }, 0);
}

function submitTextModal() {
  const text = document.getElementById('modal-text').value.trim();
  const fontSize = parseInt(document.getElementById('modal-fontsize').value, 10) || 24;
  cancelTextModal();
  if (!text) return;
  const pos = state.pendingDrop || { x: 10, y: 10 };
  state.pendingDrop = null;
  pushItem({
    id: uid(), type: 'static_text', z_index: nextZ(),
    x: pos.x, y: pos.y, w: 300, h: Math.max(40, fontSize + 20),
    plugin_id: '', variant: 'full',
    text: text, font_size: fontSize, orientation: 'horizontal',
  });
  selectItem(state.items[state.items.length - 1].id);
}

function cancelTextModal() {
  document.getElementById('text-modal').classList.add('hidden');
}

// ────────────────────────────────────────
// JSON Tree Explorer
// ────────────────────────────────────────
let explorerSourceId = null;

function buildJsonTree(data, path, keyName) {
  var node = document.createElement('div');
  node.className = 'jtree-node';

  if (data === null || data === undefined) {
    node.appendChild(makeLeafRow(keyName, 'null', 'jtree-val-null', path));
    return node;
  }
  if (typeof data === 'object' && !Array.isArray(data)) {
    var keys = Object.keys(data);
    var row = document.createElement('div');
    row.className = 'jtree-row';
    var toggle = document.createElement('span');
    toggle.className = 'jtree-toggle';
    toggle.textContent = '\u25BC';
    row.appendChild(toggle);
    if (keyName !== undefined) {
      var k = document.createElement('span');
      k.className = 'jtree-key';
      k.textContent = keyName;
      row.appendChild(k);
      var c = document.createElement('span');
      c.className = 'jtree-colon';
      c.textContent = ': ';
      row.appendChild(c);
    }
    var hint = document.createElement('span');
    hint.className = 'jtree-type-hint';
    hint.textContent = '{' + keys.length + '}';
    row.appendChild(hint);
    node.appendChild(row);

    var children = document.createElement('div');
    children.className = 'jtree-children';
    keys.forEach(function(childKey) {
      var childPath = path + '.' + childKey;
      children.appendChild(buildJsonTree(data[childKey], childPath, childKey));
    });
    node.appendChild(children);

    toggle.onclick = function() {
      var collapsed = children.classList.toggle('collapsed');
      toggle.textContent = collapsed ? '\u25B6' : '\u25BC';
    };
    return node;
  }
  if (Array.isArray(data)) {
    var row = document.createElement('div');
    row.className = 'jtree-row';
    var toggle = document.createElement('span');
    toggle.className = 'jtree-toggle';
    toggle.textContent = '\u25BC';
    row.appendChild(toggle);
    if (keyName !== undefined) {
      var k = document.createElement('span');
      k.className = 'jtree-key';
      k.textContent = keyName;
      row.appendChild(k);
      var c = document.createElement('span');
      c.className = 'jtree-colon';
      c.textContent = ': ';
      row.appendChild(c);
    }
    var hint = document.createElement('span');
    hint.className = 'jtree-type-hint';
    hint.textContent = '[' + data.length + ']';
    row.appendChild(hint);
    node.appendChild(row);

    var children = document.createElement('div');
    children.className = 'jtree-children';
    data.forEach(function(val, idx) {
      var childPath = path + '[' + idx + ']';
      children.appendChild(buildJsonTree(val, childPath, '[' + idx + ']'));
    });
    node.appendChild(children);

    toggle.onclick = function() {
      var collapsed = children.classList.toggle('collapsed');
      toggle.textContent = collapsed ? '\u25B6' : '\u25BC';
    };
    return node;
  }
  // Leaf: string, number, boolean
  var cls = 'jtree-val-string';
  var display = JSON.stringify(data);
  if (typeof data === 'number') { cls = 'jtree-val-number'; display = String(data); }
  else if (typeof data === 'boolean') { cls = 'jtree-val-bool'; display = String(data); }
  node.appendChild(makeLeafRow(keyName, display, cls, path));
  return node;
}

function makeLeafRow(keyName, display, valClass, path) {
  var row = document.createElement('div');
  row.className = 'jtree-row';
  var sp = document.createElement('span');
  sp.style.width = '12px';
  sp.style.flexShrink = '0';
  row.appendChild(sp);
  if (keyName !== undefined) {
    var k = document.createElement('span');
    k.className = 'jtree-key';
    k.textContent = keyName;
    row.appendChild(k);
    var c = document.createElement('span');
    c.className = 'jtree-colon';
    c.textContent = ': ';
    row.appendChild(c);
  }
  var v = document.createElement('span');
  v.className = valClass;
  v.textContent = display;
  row.appendChild(v);
  var btn = document.createElement('button');
  btn.className = 'jtree-add-btn';
  btn.textContent = '+ Add Field';
  btn.onclick = function(e) {
    e.stopPropagation();
    onAddFieldFromTree(path, keyName);
  };
  row.appendChild(btn);
  return row;
}

function renderTreeInto(container, data) {
  container.innerHTML = '';
  var tree = buildJsonTree(data, '$', undefined);
  tree.classList.add('jtree-root');
  container.appendChild(tree);
}

async function openJsonExplorer(sourceId) {
  explorerSourceId = sourceId;
  var modal = document.getElementById('json-explorer-modal');
  var container = document.getElementById('json-tree-container');
  var fetchBtn = document.getElementById('json-explorer-fetch-btn');
  var titleEl = document.getElementById('json-explorer-title');
  var srcName = sourceId;
  for (var i = 0; i < cachedPlugins.length; i++) {
    if (cachedPlugins[i].id === sourceId) { srcName = cachedPlugins[i].name || sourceId; break; }
  }
  titleEl.textContent = 'Browse Fields: ' + srcName;
  container.innerHTML = '<div id="json-explorer-empty">Loading...</div>';
  fetchBtn.style.display = 'none';
  modal.classList.remove('hidden');

  try {
    var res = await apiFetch('/api/admin/sources/' + encodeURIComponent(sourceId) + '/data');
    if (res.status === 404) {
      container.innerHTML = '<div id="json-explorer-empty">No cached data for this source.</div>';
      fetchBtn.style.display = '';
      return;
    }
    if (!res.ok) {
      container.innerHTML = '<div id="json-explorer-empty">Failed to load data (HTTP ' + res.status + ')</div>';
      return;
    }
    var data = await res.json();
    if (data === null || data === undefined) {
      container.innerHTML = '<div id="json-explorer-empty">Source has no cached data yet.</div>';
      fetchBtn.style.display = '';
      return;
    }
    renderTreeInto(container, data);
  } catch (e) {
    container.innerHTML = '<div id="json-explorer-empty">Error: ' + esc(e.message) + '</div>';
  }
}

async function explorerFetchNow() {
  if (!explorerSourceId) return;
  var fetchBtn = document.getElementById('json-explorer-fetch-btn');
  fetchBtn.disabled = true;
  fetchBtn.textContent = 'Fetching...';
  var container = document.getElementById('json-tree-container');
  try {
    var res = await apiFetch('/api/admin/sources/' + encodeURIComponent(explorerSourceId) + '/data');
    if (!res.ok || res.status === 404) {
      container.innerHTML = '<div id="json-explorer-empty">Still no data. The source may not have fetched yet.</div>';
    } else {
      var data = await res.json();
      if (data === null || data === undefined) {
        container.innerHTML = '<div id="json-explorer-empty">Still no data available.</div>';
      } else {
        renderTreeInto(container, data);
        fetchBtn.style.display = 'none';
      }
    }
  } catch (e) {
    container.innerHTML = '<div id="json-explorer-empty">Error: ' + esc(e.message) + '</div>';
  }
  fetchBtn.disabled = false;
  fetchBtn.textContent = 'Fetch Now';
}

function closeJsonExplorer() {
  document.getElementById('json-explorer-modal').classList.add('hidden');
}

function onAddFieldFromTree(jsonPath, leafName) {
  var srcId = explorerSourceId;
  var dfModal = document.getElementById('datafield-modal');
  var modalAlreadyOpen = !dfModal.classList.contains('hidden');

  // Close standalone explorer (no-op if hidden)
  document.getElementById('json-explorer-modal').classList.add('hidden');

  if (modalAlreadyOpen) {
    // Inline explorer: just populate JSONPath and label, don't reopen
    document.getElementById('df-modal-jsonpath').value = jsonPath;
    var readable = leafName || '';
    if (readable.charAt(0) === '[') readable = '';
    readable = readable.replace(/[_-]/g, ' ').replace(/\b\w/g, function(ch) { return ch.toUpperCase(); });
    document.getElementById('df-modal-label').value = readable;
    document.getElementById('df-modal-jsonpath').focus();
  } else {
    // Standalone explorer: open the DataField modal pre-populated
    showDataFieldModal();
    setTimeout(function() {
      if (srcId) {
        document.getElementById('df-modal-source').value = srcId;
      }
      document.getElementById('df-modal-jsonpath').value = jsonPath;
      var readable = leafName || '';
      if (readable.charAt(0) === '[') readable = '';
      readable = readable.replace(/[_-]/g, ' ').replace(/\b\w/g, function(ch) { return ch.toUpperCase(); });
      document.getElementById('df-modal-label').value = readable;
    }, 50);
  }
}

async function showInlineExplorer(sourceId) {
  var container = document.getElementById('df-explorer-inline');
  if (!sourceId) { container.classList.add('hidden'); return; }
  container.classList.remove('hidden');
  container.innerHTML = '<span style="color:#8b949e">Loading...</span>';
  explorerSourceId = sourceId;
  try {
    var res = await apiFetch('/api/admin/sources/' + encodeURIComponent(sourceId) + '/data');
    if (!res.ok || res.status === 404) {
      container.innerHTML = '<span style="color:#8b949e">No cached data. Select a JSONPath manually.</span>';
      return;
    }
    var data = await res.json();
    if (data === null || data === undefined) {
      container.innerHTML = '<span style="color:#8b949e">No data yet.</span>';
      return;
    }
    renderTreeInto(container, data);
  } catch (e) {
    container.innerHTML = '<span style="color:#f85149">Error: ' + esc(e.message) + '</span>';
  }
}

// ────────────────────────────────────────
// Data Field modal
// ────────────────────────────────────────
async function showDataFieldModal() {
  const modal = document.getElementById('datafield-modal');
  modal.classList.remove('hidden');
  const sel = document.getElementById('df-modal-source');
  // Populate sources from cached plugins
  if (!cachedPlugins.length) {
    try {
      const res = await apiFetch('/api/admin/plugins');
      if (res.ok) cachedPlugins = await res.json();
    } catch (e) { /* ignore */ }
  }
  sel.innerHTML = cachedPlugins.map(function(p) {
    return '<option value="' + esc(p.id) + '">' + esc(p.name || p.id) + '</option>';
  }).join('');
  document.getElementById('df-modal-jsonpath').value = '';
  document.getElementById('df-modal-label').value = '';
  document.getElementById('df-modal-format').value = '{{value}}';
  document.getElementById('df-modal-fontsize').value = '24';
  // Load inline explorer for the first source
  var firstSource = sel.value;
  if (firstSource) showInlineExplorer(firstSource);
  else document.getElementById('df-explorer-inline').classList.add('hidden');
  setTimeout(function() { document.getElementById('df-modal-jsonpath').focus(); }, 0);
}

function onDfSourceChange(sourceId) {
  showInlineExplorer(sourceId);
}

async function submitDataFieldModal() {
  const sourceId = document.getElementById('df-modal-source').value;
  const jsonPath = document.getElementById('df-modal-jsonpath').value.trim();
  const labelVal = document.getElementById('df-modal-label').value.trim();
  const formatStr = document.getElementById('df-modal-format').value.trim() || '{{value}}';
  const fontSize = parseInt(document.getElementById('df-modal-fontsize').value, 10) || 24;
  cancelDataFieldModal();
  if (!sourceId || !jsonPath) {
    showToast('Source and JSONPath are required', 'error');
    return;
  }

  // Create a field mapping via API
  try {
    const res = await apiFetch('/api/admin/sources/' + encodeURIComponent(sourceId) + '/fields', {
      method: 'POST',
      body: JSON.stringify({ name: labelVal || jsonPath, json_path: jsonPath }),
    });
    if (!res.ok) {
      showToast('Failed to create field mapping', 'error');
      return;
    }
    const fm = await res.json();
    const pos = state.pendingDrop || { x: 10, y: 10 };
    state.pendingDrop = null;
    pushItem({
      id: uid(), type: 'data_field', z_index: nextZ(),
      x: pos.x, y: pos.y, w: 200, h: Math.max(40, fontSize + 20),
      plugin_id: '', variant: 'full', text: '', font_size: fontSize,
      orientation: 'horizontal',
      field_mapping_id: fm.id,
      format_string: formatStr,
      label: labelVal,
      source_id: sourceId,
      json_path: jsonPath,
    });
    selectItem(state.items[state.items.length - 1].id);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

function cancelDataFieldModal() {
  document.getElementById('datafield-modal').classList.add('hidden');
  document.getElementById('df-explorer-inline').classList.add('hidden');
}

// ────────────────────────────────────────
// Helpers
// ────────────────────────────────────────
function uid() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function nextZ() {
  if (!state.items.length) return 0;
  return Math.max.apply(null, state.items.map(function(i) { return i.z_index; })) + 1;
}

function pushItem(item) {
  saveHistory();
  state.items.push(item);
  renderCanvas();
}

function findItem(id) {
  if (!id) return null;
  for (var i = 0; i < state.items.length; i++) {
    if (state.items[i].id === id) return state.items[i];
  }
  return null;
}

function clamp(v, lo, hi) {
  return v < lo ? lo : v > hi ? hi : v;
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
