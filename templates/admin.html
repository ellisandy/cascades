// Sources Panel
// ────────────────────────────────────────

function openSourcesPanel() {
  document.getElementById('sources-panel').classList.remove('hidden');
  loadSourcesList();
}

function closeSourcesPanel() {
  document.getElementById('sources-panel').classList.add('hidden');
  document.getElementById('source-form').style.display = 'none';
}

async function loadSourcesList() {
  var el = document.getElementById('sources-list');
  try {
    var res = await apiFetch('/api/admin/sources');
    var sources = await res.json();
    if (!sources.length) {
      el.innerHTML = '<p style="color:#8b949e; padding:12px;">No data sources configured. Click "+ Add Source" to create one.</p>';
      return;
    }
    var html = '<table style="width:100%; border-collapse:collapse; font-size:12px;">';
    html += '<thead><tr>';
    html += '<th style="text-align:left; color:#58a6ff; padding:6px 8px; border-bottom:1px solid #30363d;">Name</th>';
    html += '<th style="text-align:left; color:#58a6ff; padding:6px 8px; border-bottom:1px solid #30363d;">Type</th>';
    html += '<th style="text-align:left; color:#58a6ff; padding:6px 8px; border-bottom:1px solid #30363d;">URL</th>';
    html += '<th style="text-align:left; color:#58a6ff; padding:6px 8px; border-bottom:1px solid #30363d;">Status</th>';
    html += '<th style="text-align:right; color:#58a6ff; padding:6px 8px; border-bottom:1px solid #30363d;">Actions</th>';
    html += '</tr></thead><tbody>';
    for (var i = 0; i < sources.length; i++) {
      var s = sources[i];
      var statusHtml = s.last_error
        ? '<span style="color:#f85149;">' + esc(s.last_error).substring(0, 40) + '</span>'
        : (s.last_fetched_at ? '<span style="color:#3fb950;">OK</span>' : '<span style="color:#8b949e;">Pending</span>');
      var urlDisplay = s.url ? esc(s.url).substring(0, 40) + (s.url.length > 40 ? '...' : '') : '<span style="color:#8b949e;">—</span>';
      var actions = '';
      if (s.source_kind === 'generic') {
        actions = '<button class="btn" style="font-size:11px; padding:2px 6px;" onclick="editSource(\'' + esc(s.id) + '\')">Edit</button> ';
        actions += '<button class="btn" style="font-size:11px; padding:2px 6px;" onclick="fetchSource(\'' + esc(s.id) + '\')">Fetch</button> ';
        actions += '<button class="btn btn-danger" style="font-size:11px; padding:2px 6px;" onclick="deleteSource(\'' + esc(s.id) + '\')">Del</button>';
      }
      html += '<tr>';
      html += '<td style="padding:6px 8px; border-bottom:1px solid #21262d;">' + esc(s.name) + '</td>';
      html += '<td style="padding:6px 8px; border-bottom:1px solid #21262d;">' + esc(s.source_kind) + '</td>';
      html += '<td style="padding:6px 8px; border-bottom:1px solid #21262d; font-size:11px;">' + urlDisplay + '</td>';
      html += '<td style="padding:6px 8px; border-bottom:1px solid #21262d;">' + statusHtml + '</td>';
      html += '<td style="padding:6px 8px; border-bottom:1px solid #21262d; text-align:right;">' + actions + '</td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<p style="color:#f85149;">Failed to load sources: ' + esc(e.message) + '</p>';
  }
}

function showAddSourceForm() {
  document.getElementById('source-form').style.display = 'block';
  document.getElementById('source-form-title').textContent = 'Add Source';
  document.getElementById('sf-id').value = '';
  document.getElementById('sf-name').value = '';
  document.getElementById('sf-url').value = '';
  document.getElementById('sf-method').value = 'GET';
  document.getElementById('sf-interval').value = '300';
  document.getElementById('sf-headers').value = '';
  document.getElementById('sf-body').value = '';
  document.getElementById('sf-rootpath').value = '';
  document.getElementById('sf-test-result').style.display = 'none';
}

async function editSource(id) {
  try {
    var res = await apiFetch('/api/admin/sources/' + encodeURIComponent(id));
    if (!res.ok) { showToast('Source not found', 'error'); return; }
    var ds = await res.json();
    document.getElementById('source-form').style.display = 'block';
    document.getElementById('source-form-title').textContent = 'Edit Source';
    document.getElementById('sf-id').value = ds.id;
    document.getElementById('sf-name').value = ds.name || '';
    document.getElementById('sf-url').value = ds.url || '';
    document.getElementById('sf-method').value = ds.method || 'GET';
    document.getElementById('sf-interval').value = String(ds.refresh_interval_secs || 300);
    document.getElementById('sf-headers').value = ds.headers && typeof ds.headers === 'object' ? JSON.stringify(ds.headers, null, 2) : '';
    document.getElementById('sf-body').value = ds.body_template || '';
    document.getElementById('sf-rootpath').value = ds.response_root_path || '';
    document.getElementById('sf-test-result').style.display = 'none';
  } catch (e) {
    showToast('Error loading source: ' + e.message, 'error');
  }
}

function cancelSourceForm() {
  document.getElementById('source-form').style.display = 'none';
}

function buildSourcePayload() {
  var headersStr = document.getElementById('sf-headers').value.trim();
  var headers = {};
  if (headersStr) {
    try { headers = JSON.parse(headersStr); } catch (e) {
      showToast('Invalid JSON in headers', 'error');
      return null;
    }
  }
  return {
    name: document.getElementById('sf-name').value.trim(),
    url: document.getElementById('sf-url').value.trim(),
    method: document.getElementById('sf-method').value,
    headers: headers,
    body_template: document.getElementById('sf-body').value.trim() || null,
    response_root_path: document.getElementById('sf-rootpath').value.trim() || null,
    refresh_interval_secs: parseInt(document.getElementById('sf-interval').value, 10) || 300,
  };
}

async function submitSourceForm() {
  var payload = buildSourcePayload();
  if (!payload) return;
  if (!payload.name || !payload.url) {
    showToast('Name and URL are required', 'error');
    return;
  }

  var id = document.getElementById('sf-id').value;
  try {
    var res;
    if (id) {
      res = await apiFetch('/api/admin/sources/' + encodeURIComponent(id), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } else {
      res = await apiFetch('/api/admin/sources', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    }
    if (!res.ok) {
      var err = await res.json().catch(function() { return { error: 'Unknown error' }; });
      showToast('Error: ' + (err.error || res.statusText), 'error');
      return;
    }
    showToast(id ? 'Source updated' : 'Source created', 'ok');
    document.getElementById('source-form').style.display = 'none';
    loadSourcesList();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function deleteSource(id) {
  if (!confirm('Delete this source and all its field mappings?')) return;
  try {
    var res = await apiFetch('/api/admin/sources/' + encodeURIComponent(id), { method: 'DELETE' });
    if (res.ok) {
      showToast('Source deleted', 'ok');
      loadSourcesList();
    } else {
      showToast('Delete failed: ' + res.statusText, 'error');
    }
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function fetchSource(id) {
  try {
    var res = await apiFetch('/api/admin/sources/' + encodeURIComponent(id) + '/fetch', { method: 'POST' });
    var data = await res.json();
    if (data.success) {
      showToast('Fetch successful', 'ok');
      loadSourcesList();
    } else {
      showToast('Fetch failed: ' + (data.error || 'Unknown error'), 'error');
    }
  } catch (e) {
    showToast('Fetch error: ' + e.message, 'error');
  }
}

async function testSourceFetch() {
  var payload = buildSourcePayload();
  if (!payload) return;
  if (!payload.url) { showToast('URL is required', 'error'); return; }

  var resultEl = document.getElementById('sf-test-result');
  resultEl.style.display = 'block';
  resultEl.textContent = 'Fetching...';

  var id = document.getElementById('sf-id').value;
  if (!id) {
    // For unsaved sources, create temporarily then fetch then show result
    try {
      var createRes = await apiFetch('/api/admin/sources', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!createRes.ok) {
        resultEl.textContent = 'Error creating temp source: ' + createRes.statusText;
        return;
      }
      var created = await createRes.json();
      id = created.id;
      // Now fetch
      var fetchRes = await apiFetch('/api/admin/sources/' + encodeURIComponent(id) + '/fetch', { method: 'POST' });
      var fetchData = await fetchRes.json();
      if (fetchData.success) {
        resultEl.textContent = JSON.stringify(fetchData.data, null, 2);
      } else {
        resultEl.textContent = 'Fetch error: ' + (fetchData.error || 'Unknown');
      }
      // Update the form with the new ID so subsequent saves are updates
      document.getElementById('sf-id').value = id;
      document.getElementById('source-form-title').textContent = 'Edit Source';
      loadSourcesList();
    } catch (e) {
      resultEl.textContent = 'Error: ' + e.message;
    }
  } else {
    // Existing source — just trigger fetch
    try {
      var fetchRes2 = await apiFetch('/api/admin/sources/' + encodeURIComponent(id) + '/fetch', { method: 'POST' });
      var fetchData2 = await fetchRes2.json();
      if (fetchData2.success) {
        resultEl.textContent = JSON.stringify(fetchData2.data, null, 2);
      } else {
        resultEl.textContent = 'Fetch error: ' + (fetchData2.error || 'Unknown');
      }
    } catch (e) {
      resultEl.textContent = 'Error: ' + e.message;
    }
  }
}

async function showPresetPicker() {
  document.getElementById('source-form').style.display = 'none';
  document.getElementById('preset-picker').style.display = 'block';
  document.getElementById('preset-params-form').style.display = 'none';

  var listEl = document.getElementById('preset-list');
  listEl.innerHTML = '<p style="color:#8b949e;">Loading presets...</p>';

  try {
    var res = await apiFetch('/api/admin/presets');
    var presets = await res.json();
    if (!presets.length) {
      listEl.innerHTML = '<p style="color:#8b949e;">No presets available.</p>';
      return;
    }
    var html = '';
    for (var i = 0; i < presets.length; i++) {
      var p = presets[i];
      html += '<div style="background:#21262d; border:1px solid #30363d; border-radius:6px; padding:12px; cursor:pointer;" ';
      html += 'onclick="selectPreset(\'' + esc(p.id) + '\')" ';
      html += 'onmouseover="this.style.borderColor=\'#58a6ff\'" onmouseout="this.style.borderColor=\'#30363d\'">';
      html += '<div style="display:flex; justify-content:space-between; align-items:center;">';
      html += '<strong style="color:#58a6ff;">' + esc(p.name) + '</strong>';
      html += '<span style="color:#8b949e; font-size:11px; background:#0d1117; padding:2px 6px; border-radius:3px;">' + esc(p.category) + '</span>';
      html += '</div>';
      html += '<p style="color:#8b949e; font-size:12px; margin:4px 0 0 0;">' + esc(p.description) + '</p>';
      html += '</div>';
    }
    listEl.innerHTML = html;
    window._cachedPresets = presets;
  } catch (e) {
    listEl.innerHTML = '<p style="color:#f85149;">Failed to load presets: ' + esc(e.message) + '</p>';
  }
}

function selectPreset(presetId) {
  var presets = window._cachedPresets || [];
  var preset = null;
  for (var i = 0; i < presets.length; i++) {
    if (presets[i].id === presetId) { preset = presets[i]; break; }
  }
  if (!preset) return;

  document.getElementById('preset-list').style.display = 'none';
  document.getElementById('preset-params-form').style.display = 'block';
  document.getElementById('preset-params-title').textContent = preset.name;
  document.getElementById('preset-params-desc').textContent = preset.description;
  document.getElementById('pp-preset-id').value = preset.id;
  document.getElementById('pp-name').value = '';

  var fieldsHtml = '';
  for (var i = 0; i < preset.params.length; i++) {
    var param = preset.params[i];
    fieldsHtml += '<label style="color:#8b949e;">' + esc(param.name);
    if (param.required) fieldsHtml += ' <span style="color:#f85149;">*</span>';
    fieldsHtml += '</label>';
    fieldsHtml += '<input type="text" class="pp-param" data-name="' + esc(param.name) + '" ';
    fieldsHtml += 'placeholder="' + esc(param.placeholder || param.default || '') + '" ';
    fieldsHtml += 'value="' + esc(param.default || '') + '" ';
    fieldsHtml += 'style="background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:6px 8px; border-radius:3px; font-family:inherit;">';
    fieldsHtml += '<p style="color:#6e7681; font-size:11px; margin:0 0 4px 0;">' + esc(param.description) + '</p>';
  }
  document.getElementById('pp-fields').innerHTML = fieldsHtml;
}

function cancelPresetForm() {
  document.getElementById('preset-picker').style.display = 'none';
  document.getElementById('preset-list').style.display = 'grid';
  document.getElementById('preset-params-form').style.display = 'none';
}

async function submitPresetForm() {
  var presetId = document.getElementById('pp-preset-id').value;
  var name = document.getElementById('pp-name').value.trim();
  var params = {};
  var paramInputs = document.querySelectorAll('.pp-param');
  for (var i = 0; i < paramInputs.length; i++) {
    var inp = paramInputs[i];
    var val = inp.value.trim();
    if (val) params[inp.getAttribute('data-name')] = val;
  }

  var payload = { preset_id: presetId, params: params };
  if (name) payload.name = name;

  try {
    var res = await apiFetch('/api/admin/sources/from-preset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      var err = await res.json().catch(function() { return { error: 'Unknown error' }; });
      showToast('Error: ' + (err.error || res.statusText), 'error');
      return;
    }
    showToast('Source created from preset', 'ok');
    document.getElementById('preset-picker').style.display = 'none';
    document.getElementById('preset-list').style.display = 'grid';
    document.getElementById('preset-params-form').style.display = 'none';
    loadSourcesList();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}
