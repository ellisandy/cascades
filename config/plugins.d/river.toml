[[plugin]]
id = "river"
name = "USGS River Gauge"
description = "River level and flow rate from a USGS NWIS site."
source = "usgs"
refresh_interval_secs = 300
data_strategy = "polling"


[[plugin.criteria]]
key = "water_level_ft"
label = "River level"
operator = "lte"
threshold = 12.0
unit = "ft"
go_direction = "below"

[[plugin.criteria]]
key = "streamflow_cfs"
label = "Streamflow"
operator = "lte"
threshold = 10000.0
unit = "cfs"
go_direction = "below"

[[plugin.settings_schema]]
key = "site_id"
label = "USGS Site ID"
type = "text"
required = true
placeholder = "12200500"

[[plugin.settings_schema]]
key = "site_name"
label = "Display Name"
type = "text"
required = false
default = "River"

[[plugin.default_elements]]
kind = "static_text"
text_content = "River"
x = 10
y = 10
width = 180
height = 24
font_size = 32

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.water_level_ft"
label = "Level"
format_string = "{{value}} ft"
x = 10
y = 40
width = 160
height = 56
font_size = 40

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.streamflow_cfs"
label = "Flow"
format_string = "{{value}} cfs"
x = 10
y = 104
width = 180
height = 24
font_size = 32

[[plugin.default_elements]]
kind = "static_divider"
orientation = "horizontal"
x = 10
y = 136
width = 180
height = 2
