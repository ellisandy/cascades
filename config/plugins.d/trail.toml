[[plugin]]
id = "trail"
name = "NPS Trail Conditions"
description = "Trail and campsite suitability from the National Park Service alerts API."
source = "trail_conditions"
refresh_interval_secs = 900
data_strategy = "polling"

template_full = "templates/trail_full.html.jinja"

[[plugin.settings_schema]]
key = "park_code"
label = "NPS Park Code"
type = "text"
required = true
placeholder = "noca"

[[plugin.settings_schema]]
key = "nps_api_key"
label = "NPS API Key"
type = "text"
required = false

[[plugin.default_elements]]
kind = "static_text"
text_content = "Trail Conditions"
x = 10
y = 10
width = 220
height = 24
font_size = 16

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.destination_name"
label = "Destination"
format_string = "{{value}}"
x = 10
y = 40
width = 220
height = 32
font_size = 22

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.suitability_summary"
label = "Status"
format_string = "{{value}}"
x = 10
y = 80
width = 220
height = 24
font_size = 14

[[plugin.default_elements]]
kind = "static_divider"
orientation = "horizontal"
x = 10
y = 112
width = 220
height = 2
