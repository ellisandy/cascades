[[plugin]]
id = "ferry"
name = "WSDOT Ferry"
description = "Ferry vessel status and upcoming departures for a WSDOT route."
source = "wsdot"
refresh_interval_secs = 60
data_strategy = "polling"


[[plugin.settings_schema]]
key = "route_id"
label = "WSDOT Route ID"
type = "number"
required = true
placeholder = "9"

[[plugin.settings_schema]]
key = "route_description"
label = "Route Description"
type = "text"
required = false
placeholder = "Anacortes / Friday Harbor"

[[plugin.settings_schema]]
key = "wsdot_access_code"
label = "WSDOT Access Code"
type = "text"
required = false

[[plugin.default_elements]]
kind = "static_text"
text_content = "Ferry"
x = 10
y = 10
width = 180
height = 24
font_size = 16

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.vessel_name"
label = "Vessel"
format_string = "{{value}}"
x = 10
y = 40
width = 200
height = 40
font_size = 28

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.route"
label = "Route"
format_string = "{{value}}"
x = 10
y = 88
width = 200
height = 24
font_size = 14

[[plugin.default_elements]]
kind = "static_divider"
orientation = "horizontal"
x = 10
y = 120
width = 200
height = 2
