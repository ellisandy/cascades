[[plugin]]
id = "weather"
name = "NOAA Weather"
description = "Current conditions from a NOAA observation station near the destination."
source = "noaa"
refresh_interval_secs = 300
data_strategy = "polling"


[[plugin.criteria]]
key = "temperature_f"
label = "Temperature"
operator = "gte"
threshold = 45.0
unit = "°F"
go_direction = "above"

[[plugin.criteria]]
key = "temperature_f"
label = "Max temperature"
operator = "lte"
threshold = 95.0
unit = "°F"
go_direction = "below"

[[plugin.criteria]]
key = "precip_chance_pct"
label = "Precipitation chance"
operator = "lte"
threshold = 50.0
unit = "%"
go_direction = "below"

[[plugin.settings_schema]]
key = "station_id"
label = "NOAA Station ID"
type = "text"
required = false
placeholder = "KMWH"

# Phase 9: theming knobs. Theming-typed fields ("text_style", "color",
# "toggle") declare the same shape as data settings, but values are stored
# per-layout on the plugin Group's `style_overrides` column. The Liquid
# template reads them via `{{ style.<key>.<sub> | default(<value>) }}`.

[[plugin.settings_schema]]
key = "temp_style"
label = "Temperature style"
type = "text_style"

[[plugin.settings_schema]]
key = "accent_color"
label = "Accent colour"
type = "color"

# Decomposition: dropping "weather" onto the canvas spawns a Group with these
# children instead of a single opaque PluginSlot.
[[plugin.default_elements]]
kind = "static_text"
text_content = "Weather"
x = 10
y = 10
width = 180
height = 24
font_size = 16

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.temperature_f"
label = "Temp"
format_string = "{{value}}°F"
x = 10
y = 40
width = 120
height = 56
font_size = 44

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.sky_condition"
label = "Sky"
format_string = "{{value}}"
x = 10
y = 104
width = 180
height = 24
font_size = 16

[[plugin.default_elements]]
kind = "data_field"
field_path = "$.wind_speed_mph"
label = "Wind"
format_string = "{{value}} mph"
x = 10
y = 134
width = 180
height = 20
font_size = 14

[[plugin.default_elements]]
kind = "static_divider"
orientation = "horizontal"
x = 10
y = 162
width = 180
height = 2
